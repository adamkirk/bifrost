services:
  api:
    build:
      context: ./api
      target: dev
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - 8080:8080
    environment:
      # Means nothing yet.
      APP_CMD: "serve"
      AIR_DEBUG: ${AIR_DEBUG:-false}

  ui:
    build:
      context: ./ui
      target: dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
    command: npm run dev
